<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <title>ParkEyeRay — няма връзка</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#07111f;color:#f8fafc;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}.card{width:min(520px,100%);padding:28px;border:1px solid rgba(148,163,184,.2);border-radius:24px;background:#0d1b2c;box-shadow:0 20px 60px rgba(0,0,0,.3)}h1{margin:0 0 12px;font-size:28px}p{margin:0 0 18px;color:#b7c5d8;line-height:1.55}.badge{display:inline-block;margin-bottom:18px;padding:6px 10px;border-radius:999px;background:rgba(56,189,248,.12);color:#7dd3fc;font-weight:800;font-size:12px}button{width:100%;min-height:48px;border:0;border-radius:14px;background:#0ea5e9;color:white;font-weight:900;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Offline режим</span>
    <h1>Няма интернет връзка</h1>
    <p>Картата, търсенето, маршрутите и актуалните външни данни изискват връзка. Локално запазените настройки остават в браузъра.</p>
    <button type="button" onclick="location.reload()">Опитай отново</button>
  </main>
</body>
</html>

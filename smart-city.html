<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#06121f">
  <title>SF Smart City Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">
  <link rel="stylesheet" href="/smart-city-base.css">
  <link rel="stylesheet" href="/smart-city-components.css">
</head>
<body>
  <div id="map"></div>
  <header class="topbar">
    <div class="brand"><b>SF</b><span>Smart City</span></div>
    <div class="search-box">
      <form id="search" class="search">
        <input id="q" type="search" autocomplete="off" placeholder="Адрес или обект — Ямбол мол, Стара Загора мол…">
        <button>Тръгни</button>
      </form>
      <div id="search-results" class="search-results"></div>
    </div>
    <button id="locate" class="icon-btn" aria-label="Следвай ме">◎</button>
  </header>

  <nav class="layers" aria-label="Smart City слоеве">
    <button class="layer active" data-layer="parking" data-label="Зареди всички паркинги в радиуса" title="Всички OSM паркинги в избрания радиус">P</button>
    <button class="layer active" data-layer="charging" data-label="Зарядни" title="Зарядни">⚡</button>
    <button class="layer" data-layer="fuel" data-label="Гориво" title="Гориво">⛽</button>
    <button class="layer" data-layer="camera" data-label="OSM камери" title="Камери в OSM">◉</button>
    <button class="layer" data-layer="signal" data-label="Светофари" title="Светофари">🚦</button>
    <button class="layer" data-layer="roadwork" data-label="Ремонти" title="Ремонти">⚠</button>
    <button class="layer" data-layer="pothole" data-label="Лоши пътища" title="Лоши и трудно проходими пътища в OSM">◌</button>
    <button class="layer" data-layer="traffic" data-label="Ограничения" title="Затворени и ограничени пътища в OSM">↯</button>
  </nav>

  <aside class="radius-control" aria-label="Радиус около активния център">
    <button id="zoom-in" class="radius-icon" aria-label="Приближи картата">＋</button>
    <input id="radius" class="radius-range" type="range" min="0" max="15" value="7" step="1">
    <button id="zoom-out" class="radius-icon" aria-label="Отдалечи картата">−</button>
    <div id="radius-value" class="radius-value">1 км</div>
  </aside>

  <div id="status" class="status">Стартирам GPS и Smart City слоевете…</div>

  <section id="sheet" class="sheet">
    <button id="sheet-toggle" class="sheet-toggle" aria-label="Свий панела">⌄</button>
    <div class="sheet-head">
      <div>
        <div id="eyebrow" class="eyebrow">Ти си центърът</div>
        <div id="place" class="place">Определям местоположението…</div>
        <div id="meta" class="meta">Радиусът и данните се движат автоматично с теб.</div>
      </div>
      <div id="accuracy" class="radius-value">GPS</div>
    </div>
    <div id="counts" class="counts"></div>
    <div id="nearest-parking" class="nearest-parking">
      <b id="nearest-name">Най-близък паркинг</b>
      <span id="nearest-distance">—</span>
      <small>Най-близък отбелязан OSM паркинг. Няма live информация дали има свободно място.</small>
    </div>
    <div class="sheet-tools"><span id="last-update">Няма заредени данни</span><button id="retry" class="retry">Обнови</button></div>
    <div id="route-actions" class="route-actions">
      <a id="external-route" target="_blank" rel="noopener">До паркинга</a>
      <a id="external-destination" target="_blank" rel="noopener">До обекта</a>
      <button id="clear-route">Затвори маршрута</button>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <script src="/smart-city-state.js"></script>
  <script src="/smart-city-parking-grid.js"></script>
  <script src="/smart-city-data.js"></script>
  <script src="/smart-city-search.js"></script>
  <script src="/smart-city-route.js"></script>
  <script src="/smart-city-init.js"></script>
</body>
</html>

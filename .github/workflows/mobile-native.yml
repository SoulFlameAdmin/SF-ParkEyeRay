name: ParkEyeRay Mobile Native

on:
  push:
    branches:
      - mobile-maplibre-mvp
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-native.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-native.yml'

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: npm
          cache-dependency-path: mobile/package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Expo diagnostics
        id: expo_doctor
        continue-on-error: true
        shell: bash
        run: npx expo-doctor 2>&1 | tee expo-doctor.log
      - name: TypeScript
        id: typescript
        continue-on-error: true
        shell: bash
        run: npm run typecheck 2>&1 | tee typescript.log
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-validation-reports
          path: |
            mobile/expo-doctor.log
            mobile/typescript.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce validation
        if: steps.expo_doctor.outcome == 'failure' || steps.typescript.outcome == 'failure'
        run: |
          echo "Mobile validation failed. See mobile-validation-reports artifact."
          echo "expo-doctor=${{ steps.expo_doctor.outcome }} typescript=${{ steps.typescript.outcome }}"
          exit 1

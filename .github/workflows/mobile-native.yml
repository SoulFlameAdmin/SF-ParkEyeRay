name: ParkEyeRay Mobile Native

on:
  push:
    branches:
      - mobile-maplibre-mvp
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-native.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-native.yml'

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: npm
          cache-dependency-path: mobile/package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Expo diagnostics
        run: npx expo-doctor
      - name: TypeScript
        run: npm run typecheck

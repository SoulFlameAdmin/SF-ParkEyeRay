name: ParkEyeRay Mobile Native

on:
  push:
    branches:
      - mobile-maplibre-mvp
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-native.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-native.yml'

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: npm
          cache-dependency-path: mobile/package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Expo diagnostics
        shell: bash
        run: |
          set +e
          npx expo-doctor 2>&1 | tee expo-doctor.log
          printf '%s' "${PIPESTATUS[0]}" > expo-doctor.status
          exit 0
      - name: TypeScript
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee typescript.log
          printf '%s' "${PIPESTATUS[0]}" > typescript.status
          exit 0
      - name: Parking intelligence tests
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee tests.log
          printf '%s' "${PIPESTATUS[0]}" > tests.status
          exit 0
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-validation-reports
          path: |
            mobile/expo-doctor.log
            mobile/expo-doctor.status
            mobile/typescript.log
            mobile/typescript.status
            mobile/tests.log
            mobile/tests.status
          if-no-files-found: error
          retention-days: 7
      - name: Enforce validation
        shell: bash
        run: |
          doctor_status=$(cat expo-doctor.status)
          typescript_status=$(cat typescript.status)
          tests_status=$(cat tests.status)
          echo "expo-doctor=$doctor_status typescript=$typescript_status tests=$tests_status"
          if [ "$doctor_status" -ne 0 ] || [ "$typescript_status" -ne 0 ] || [ "$tests_status" -ne 0 ]; then
            echo "Mobile validation failed. See mobile-validation-reports artifact."
            exit 1
          fi

name: ParkEyeRay Mobile Native

on:
  push:
    branches:
      - mobile-maplibre-mvp
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-native.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-native.yml'

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: npm
          cache-dependency-path: mobile/package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Expo diagnostics
        id: expo_doctor
        shell: bash
        run: |
          set +e
          npx expo-doctor 2>&1 | tee expo-doctor.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: TypeScript
        run: npm run typecheck
      - name: Upload Expo diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expo-doctor-report
          path: mobile/expo-doctor.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce Expo diagnostics
        if: steps.expo_doctor.outputs.status != '0'
        run: |
          echo "Expo Doctor reported configuration problems. See expo-doctor-report artifact."
          exit 1

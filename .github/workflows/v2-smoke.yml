name: SmartCity V2 smoke

on:
  push:
    branches:
      - smartcity-v2-foundation
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: JavaScript syntax
        run: |
          node --check v2.js
          node --check v2-core.js
          node --check v2-ui.js
          node --check v2-parking.js
          node --check v2-destinations.js
          node --check v2-parking-engine.js
          node --check v2-route.js
          node --check v2-proposals.js
          node --check v2-submission-adapter.js
          node --check v2-init.js
          node --check api/geocode.js
          node --check api/overpass.js
          node --check api/routing.js
          node --check api/v2/parkings.js
          node --check api/v2/_evidence-token.js
          node --check api/v2/evidence-upload-token.js
          node --check api/v2/parking-proposals.js
          node --check scripts/import-osm-parking.cjs
          node --check scripts/test-v2-parking-engine.cjs
          node --check scripts/test-v2-contracts.cjs
          node --check scripts/test-v2-submission-api.cjs
          node --check scripts/test-v2-evidence-api.cjs

      - name: Verify V2 route and five primary actions
        run: |
          grep -q '"source": "/v2"' vercel.json
          grep -q 'data-action="search"' v2.html
          grep -q 'data-action="parkings"' v2.html
          grep -q 'data-action="navigate"' v2.html
          grep -q 'data-action="add"' v2.html
          grep -q 'data-action="profile"' v2.html
          test "$(grep -o 'class="nav-action' v2.html | wc -l)" -eq 5
          grep -q 'aria-current="page"' v2.html

      - name: Verify interface stability states
        run: |
          test -s v2-stability.css
          grep -q '/v2-stability.css' v2.html
          grep -q 'id="network-state"' v2.html
          grep -q 'id="global-retry"' v2.html
          grep -q "'/v2-ui.js'" v2.js
          grep -q 'app.setBusy' v2-ui.js
          grep -q 'app.newRequest' v2-ui.js
          grep -q 'app.renderParkingMessage' v2-ui.js
          grep -q 'AbortError' v2-parking.js
          grep -q 'AbortError' v2-route.js

      - name: Verify Stage 2 destination intelligence
        run: |
          test -s v2-search.css
          test -s v2-destinations.js
          grep -q '/v2-search.css' v2.html
          grep -q "'/v2-destinations.js'" v2.js
          grep -q 'id="save-destination"' v2.html
          grep -q 'aria-autocomplete="list"' v2.html
          grep -q 'sf_v2_destination_history' v2-core.js
          grep -q 'sf_v2_saved_destinations' v2-core.js
          grep -q 'app.rankSearchResults' v2-destinations.js
          grep -q 'app.rememberDestination' v2-destinations.js
          grep -q 'app.toggleSavedDestination' v2-destinations.js
          grep -q 'setTimeout.*350' v2-destinations.js
          grep -q 'Изчисти историята' v2-destinations.js

      - name: Verify Stage 3 parking data engine contract
        run: |
          test -s contracts/parking-import.schema.json
          test -s supabase/migrations/20260715223000_parking_data_engine.sql
          grep -q "'/v2-parking-engine.js'" v2.js
          grep -q '/api/v2/parkings' v2-parking-engine.js
          grep -q 'SmartCity PostGIS база' v2-parking-engine.js
          grep -q 'overpass-fallback' api/v2/parkings.js
          grep -q 'liveOccupancy: false' api/v2/parkings.js
          grep -q 'mergeParkingRecords' api/v2/parkings.js
          grep -q 'search_parking_features' api/v2/parkings.js
          grep -q 'create table public.parking_features' supabase/migrations/20260715223000_parking_data_engine.sql
          grep -q 'create table public.parking_import_runs' supabase/migrations/20260715223000_parking_data_engine.sql
          grep -q 'create or replace function public.search_parking_features' supabase/migrations/20260715223000_parking_data_engine.sql
          grep -q 'create or replace function public.finalize_parking_import' supabase/migrations/20260715223000_parking_data_engine.sql
          grep -q 'source_revision' scripts/import-osm-parking.cjs

      - name: Verify parking engine behavior
        run: node scripts/test-v2-parking-engine.cjs

      - name: Verify destination routing contract
        run: |
          grep -q 'parking_space' api/v2/parkings.js
          grep -q 'parking:(left|right|both)' api/v2/parkings.js
          grep -q 'parking_entrance' api/v2/parkings.js
          grep -q '/api/geocode' v2-parking.js
          grep -q '/api/routing' v2-route.js
          grep -Eq "profile[[:space:]]*===[[:space:]]*'walking'" api/routing.js
          grep -q 'hasMappedEntrance' v2-route.js

      - name: Verify proposal moderation truth labels
        run: |
          grep -q 'Чака SoulFlame одобрение' v2.html
          grep -q "status:'pending_soulflame'" v2-proposals.js
          grep -q 'Не е публикувано като проверен обществен паркинг' v2-proposals.js
          grep -q 'без live свободни места' v2-core.js

      - name: Verify submission adapter contract
        run: node scripts/test-v2-contracts.cjs

      - name: Verify submission API contract
        run: node scripts/test-v2-submission-api.cjs

      - name: Verify evidence upload contract
        run: node scripts/test-v2-evidence-api.cjs

      - name: Verify PostGIS moderation and storage guards
        run: |
          grep -q "status = 'approved'" supabase/migrations/20260715190000_smartcity_parking_foundation.sql
          grep -q 'pending_soulflame' supabase/migrations/20260715190000_smartcity_parking_foundation.sql
          grep -q "const STATUS='pending_soulflame'" v2-submission-adapter.js
          grep -q "const STATUS = 'pending_soulflame'" api/v2/parking-proposals.js
          grep -q '^  false,$' supabase/migrations/20260715211500_parking_evidence_storage.sql
          grep -q "storage.foldername(name)" supabase/migrations/20260715211500_parking_evidence_storage.sql
